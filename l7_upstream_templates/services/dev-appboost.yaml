# YANGOCLOUD-1837
dev-appboost:
  extends: common2tvm
  config:
    l7_upstream_macro:
      headers:
        - create:
            target: X-Forwarded-For
            func: realip
        - create:
            target: X-Real-IP
            func: realip
        - create:
            target: X-Forwarded-Proto
            func: scheme
        - create:
            target: X-Forwarded-Protocol
            func: scheme
        - create:
            target: X-Request-Id
            keep_existing: true
            func: reqid
