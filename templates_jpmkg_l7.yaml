        matcher:
          host_re: app\.taximeter\..*
        headers:
        - copy:
            source: Host
            target: X-YProxy-Header-Host
            keep_existing: false
        - create:
            target: X-Forwarded-For-Y
            func: realip
        - create:
            target: X-YProxy
            value: 'true'
            keep_existing: false
        - create:
            target: X-NginX-Proxy
            value: 'true'
            keep_existing: false
        - create:
