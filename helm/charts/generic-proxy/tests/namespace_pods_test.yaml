suite: node and rack max pods
release:
  name: release-name
values:
  - ../values-example.yaml
templates:
  - templates/AwacsNamespace.yaml
tests:
  - it: default calculation
    asserts:
      - equal:
          path: spec.namespace_spec.allocation.preset_allocation.antiaffinity_constraints.node_max_pods
          value: 1
      - equal:
          path: spec.namespace_spec.allocation.preset_allocation.antiaffinity_constraints.rack_max_pods
          value: 1
  - it: custom calculation
    set:
      number_of_pods: 10
      override_defaults.nodes_count: 3
      override_defaults.availability_zones_count: 3
    asserts:
      - equal:
          path: spec.namespace_spec.allocation.preset_allocation.antiaffinity_constraints.node_max_pods
          value: 4
      - equal:
          path: spec.namespace_spec.allocation.preset_allocation.antiaffinity_constraints.rack_max_pods
          value: 4
  - it: custom calculation with uneven number of pods
    set:
      number_of_pods: 13
      override_defaults.nodes_count: 11
      override_defaults.availability_zones_count: 5
    asserts:
      - equal:
          path: spec.namespace_spec.allocation.preset_allocation.antiaffinity_constraints.node_max_pods
          value: 2
      - equal:
          path: spec.namespace_spec.allocation.preset_allocation.antiaffinity_constraints.rack_max_pods
          value: 3
  - it: default degrade params
    asserts:
      - equal:
          path: spec.namespace_spec.allocation.preset_allocation.degrade_params.max_unavailable_pods
          value: 1
      - equal:
          path: spec.namespace_spec.allocation.preset_allocation.degrade_params.min_update_delay_seconds
          value: 300
  - it: override degrade params
    set:
      override_defaults.max_unavailable_pods: 5
      override_defaults.min_update_delay_seconds: 100
    asserts:
      - equal:
          path: spec.namespace_spec.allocation.preset_allocation.degrade_params.max_unavailable_pods
          value: 5
      - equal:
          path: spec.namespace_spec.allocation.preset_allocation.degrade_params.min_update_delay_seconds
          value: 100
