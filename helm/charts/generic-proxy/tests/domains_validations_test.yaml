suite: domain validation
release:
  name: release-name
values:
  - ../values-example.yaml
templates:
  - templates/AwacsEasyDomain.yaml
tests:
  - it: fails on shadow_fqdn intersection
    set:
      domains:
        a.test:
          shadow_fqdns:
            - same.test
          target_fqdn: ya.ru
          tvm_service_ticket: '2056065'
          l7_upstream_template: common-one-attempt
        b.test:
          shadow_fqdns:
            - same.test
          target_fqdn: ya.ru
          tvm_service_ticket: '2056065'
          l7_upstream_template: common-one-attempt
    asserts:
      - failedTemplate:
          errorPattern: "shadow_fqdn"
  - it: defaults shadow_fqdns to domain name
    set:
      domains: {}
      'domains.[c.test].target_fqdn': ya.ru
      'domains.[c.test].tvm_service_ticket': '2056065'
      'domains.[c.test].l7_upstream_template': common-one-attempt
    asserts:
      - equal:
          path: spec.shadow_fqdns[0]
          value: c.test
    documentSelector:
      path: metadata.name
      value: c.test-90b19a18
