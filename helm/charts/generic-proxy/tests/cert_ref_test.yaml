suite: cert ref
release:
  name: release-name
values:
  - ../values-example.yaml
templates:
  - templates/AwacsEasyDomain.yaml
tests:
  - it: render cert_ref when cert_ref_id provided
    set:
      domains:
        test1.taxi.tst.yandex.net:
          shadow_fqdns:
            - test1.taxi.tst.yandex.net
          target_fqdn: api.taxi.tst.yandex.net
          tvm_service_ticket: '2056065'
          l7_upstream_template: common-one-attempt
          cert_ref_id: my-cert-id
    documentSelector:
      path: metadata.name
      value: test1.taxi.tst.yandex.net-90b19a18
    asserts:
      - equal:
          path: spec.cert_ref.id
          value: my-cert-id
      - notExists:
          path: spec.cert
  - it: render cert when cert_ref_id not provided
    set:
      domains:
        test2.taxi.tst.yandex.net:
          shadow_fqdns:
            - test2.taxi.tst.yandex.net
          target_fqdn: api.taxi.tst.yandex.net
          tvm_service_ticket: '2056065'
          l7_upstream_template: common-one-attempt
    documentSelector:
      path: metadata.name
      value: test2.taxi.tst.yandex.net-90b19a18
    asserts:
      - isNotNull:
          path: spec.cert
      - notExists:
          path: spec.cert_ref
