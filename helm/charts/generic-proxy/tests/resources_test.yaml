suite: balancer override ids
release:
  name: release-name
values:
  - ../values-example.yaml
templates:
  - templates/AwacsBalancer.yaml
tests:
  - it: override balancer ids
    set:
      override_defaults.l7_balancer_id: balancer-test
      override_defaults.l7_balancer_service_id: balancer-service
    asserts:
      - equal:
          path: metadata.name
          value: balancer-test
      - equal:
          path: spec.balancer_spec.config_transport.nanny_static_file.service_id
          value: balancer-service
      - isNotNull:
          path: spec.balancer_spec.components.awacslet
---
suite: easy domain fields
release:
  name: release-name
values:
  - ../values-example.yaml
set:
  domains:
    simple.taxi.tst.yandex.net:
      shadow_fqdns:
        - simple.taxi.tst.yandex.net
      target_fqdn: ya.ru
      tvm_service_ticket: '2056065'
      l7_upstream_template: common-one-attempt
templates:
  - templates/AwacsEasyDomain.yaml
tests:
  - it: easy domain has required fields
    asserts:
      - isNotNull:
          path: spec.cert
      - isNotNull:
          path: spec.hsts
      - isNotNull:
          path: spec.upstreams
  - it: should have 5 upstreams for test-upstreams.taxi.tst.yandex.net
    documentSelector:
      path: metadata.name
      value: test-upstreams.taxi.tst.yandex.net-90b19a18
    asserts:
      - lengthEqual:
          path: spec.upstreams
          count: 5