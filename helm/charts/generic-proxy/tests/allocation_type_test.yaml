suite: allocation type rendering
release:
  name: release-name
values:
  - ../values-example.yaml
templates:
  - templates/AwacsNamespace.yaml
tests:
  - it: renders AWACS allocation when allocation_type is AWACS
    set:
      allocation_type: AWACS
    asserts:
      - equal:
          path: spec.namespace_spec.allocation.allocation_type
          value: AWACS
      - isNotEmpty:
          path: spec.namespace_spec.allocation.awacs_allocation
      - isNull:
          path: spec.namespace_spec.allocation.preset_allocation

  - it: renders PRESET allocation by default when allocation_type is not specified
    set:
      allocation_type: null
    asserts:
      - equal:
          path: spec.namespace_spec.allocation.allocation_type
          value: PRESET
      - isNotEmpty:
          path: spec.namespace_spec.allocation.preset_allocation
      - isNull:
          path: spec.namespace_spec.allocation.awacs_allocation

  - it: renders PRESET allocation when allocation_type is PRESET
    set:
      allocation_type: PRESET
    asserts:
      - equal:
          path: spec.namespace_spec.allocation.allocation_type
          value: PRESET
      - isNotEmpty:
          path: spec.namespace_spec.allocation.preset_allocation
      - isNull:
          path: spec.namespace_spec.allocation.awacs_allocation
