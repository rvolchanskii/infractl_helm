suite: allocation type rendering
release:
  name: release-name
templates:
  - templates/AwacsNamespace.yaml
tests:
  - it: renders AWACS allocation when allocation_type is AWACS
    set:
      infractl_namespace: test-ns
      environment: testing
      number_of_pods: 3
      override_defaults:
        awacs_namespace_name: test-ns
      allocation_type: AWACS
      awacs_allocation:
        pod_spec:
          vcpu_guarantee: 500
          vcpu_limit: 500
          memory_guarantee: 1536
          main_volume:
            storage_type: SSD
            size: 128
            bandwidth_guarantee: 1
          log_volume:
            storage_type: SSD
            size: 128
            bandwidth_guarantee: 1
          cache_volume:
            storage_type: SSD
            size: 128
            bandwidth_guarantee: 1
          network_bandwidth_guarantee: 1
    asserts:
      - equal:
          path: spec.namespace_spec.allocation.allocation_type
          value: AWACS
      - isNotEmpty:
          path: spec.namespace_spec.allocation.awacs_allocation
      - isNull:
          path: spec.namespace_spec.allocation.preset_allocation

  - it: renders PRESET allocation by default when allocation_type is not specified
    set:
      infractl_namespace: test-ns
      environment: testing
      number_of_pods: 3
      override_defaults:
        awacs_namespace_name: test-ns
      allocation_preset_type: CPU_100_RAM_1G
    asserts:
      - equal:
          path: spec.namespace_spec.allocation.allocation_type
          value: PRESET
      - isNotEmpty:
          path: spec.namespace_spec.allocation.preset_allocation
      - isNull:
          path: spec.namespace_spec.allocation.awacs_allocation

  - it: renders PRESET allocation when allocation_type is PRESET
    set:
      infractl_namespace: test-ns
      environment: testing
      number_of_pods: 3
      override_defaults:
        awacs_namespace_name: test-ns
      allocation_type: PRESET
      allocation_preset_type: CPU_100_RAM_1G
    asserts:
      - equal:
          path: spec.namespace_spec.allocation.allocation_type
          value: PRESET
      - isNotEmpty:
          path: spec.namespace_spec.allocation.preset_allocation
      - isNull:
          path: spec.namespace_spec.allocation.awacs_allocation
