suite: domain template placeholders validation
release:
  name: release-name
values:
  - ../values-example.yaml
templates:
  - templates/AwacsUpstream.yaml
tests:
  - it: fails when tvm service ticket required but missing
    set:
      domains:
        example.com:
          target_fqdn: target.example
          l7_upstream_template: common-one-attempt
    asserts:
      - failedTemplate:
          errorPattern: "tvm_service_ticket"
  - it: fails when host header required but missing
    set:
      domains:
        example.com:
          target_fqdn: target.example
          l7_upstream_template: common2sethost
          tvm_service_ticket: "2056065"
    asserts:
      - failedTemplate:
          errorPattern: "host_header"
  - it: fails when tvm service ticket set but not used by template
    set:
      domains:
        example.com:
          target_fqdn: target.example
          l7_upstream_template: generic
          tvm_service_ticket: "2056065"
    asserts:
      - failedTemplate:
          errorPattern: "tvm_service_ticket"
  - it: fails when host header set but not used by template
    set:
      domains:
        example.com:
          target_fqdn: target.example
          l7_upstream_template: generic
          host_header: "example.internal"
    asserts:
      - failedTemplate:
          errorPattern: "host_header"
